<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merhaba</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: sans-serif;
        }
        .container {
            text-align: center;
            padding: 3rem;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        h1 { font-size: 4rem; color: #fff; margin-bottom: 1rem; }
        p { font-size: 1.2rem; color: rgba(255,255,255,0.85); margin-bottom: 2rem; }
        a {
            display: inline-block;
            padding: 0.75rem 2rem;
            background: #fff;
            color: #333;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Merhaba!</h1>
        <p>Bu sayfaya hos geldiniz.</p>
        <a href="https://github.com/fatih-crypto/arcuray" target="_blank">GitHub Reposu</a>
    </div>
</body>
</html>
